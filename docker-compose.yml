version: '3.8'

services:
  # ============================================
  # 基础设施服务
  # ============================================

  # Redis - 缓存和限流
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Milvus - 向量数据库
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.9
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.3.5
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
    depends_on:
      - milvus-etcd
      - milvus-minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MongoDB - 任务状态存储
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MCP Gateway
  # ============================================
  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-4444}:4444"
    env_file: .env
    volumes:
      - ./keys:/app/keys:ro
      - ./config:/app/config
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Chat Service (新增)
  # ============================================
  chat-service:
    build: ./services/chat-service
    ports:
      - "${CHAT_SERVICE_PORT:-8007}:8007"
    env_file: .env
    volumes:
      - ./services/chat-service:/app
    depends_on:
      - mongodb
      - milvus
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530

  # ============================================
  # Tools MCP Service (新增)
  # ============================================
  tools-mcp:
    build: ./services/tools-mcp
    ports:
      - "${TOOLS_MCP_PORT:-8008}:8008"
    env_file: .env
    volumes:
      - ./services/tools-mcp:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - AMAP_API_KEY=${AMAP_API_KEY}

  # ============================================
  # MCP Servers
  # ============================================

  # User Service
  user-service:
    build: ./services/user-service
    ports:
      - "${USER_SERVICE_PORT:-8001}:8001"
    env_file: .env
    volumes:
      - ./services/user-service:/app
    depends_on:
      - redis
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017
      - MONGODB_DB_NAME=careagent

  # ============================================
  # 已删除的旧服务（已合并到chat-service）
  # - memory-service (合并到chat-service/modules/memory.py)
  # - speech-service (合并到chat-service/modules/speech.py)
  # - vision-service (合并到chat-service/modules/vision.py)
  # - llm-service (合并到chat-service/modules/llm.py)
  # - schedule-service (功能由前端实现)

  # ============================================
  # Web Frontend
  # ============================================
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    env_file: .env
    volumes:
      - ./frontend:/app
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Observability
  # ============================================

  # MLflow Tracking Server (暂时禁用 - 镜像下载问题)
  # mlflow:
  #   image: ghcr.io/mlflow/mlflow:v2.9.0
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     - MLFLOW_TRACKING_URI=http://localhost:5000
  #   volumes:
  #     - mlflow-data:/mlruns
  #   command: mlflow server --host 0.0.0.0 --port 5000
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data:
  etcd-data:
  minio-data:
  milvus-data:
  mongodb-data:
  mlflow-data:
  prometheus-data:
  grafana-data:
